[pytest]
# pytest-asyncio konfigürasyonu — async testler için event loop yönetimi.
# strict mode: her async test explicit @pytest.mark.asyncio gerektirir
# (auto vs explicit ergonomi tartışması; biz explicit tercih → niyet net).
asyncio_mode = strict

# Test discovery — agents/tests/ altındaki test_*.py dosyaları.
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# Output sade — log gürültüsünü kapat (FakeEmbedder no-op zaten).
log_cli = false
addopts = -ra --strict-markers
