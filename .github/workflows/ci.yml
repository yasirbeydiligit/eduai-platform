name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies (prod + dev)
        # requirements-dev.txt zaten -r ile requirements.txt'i çeker.
        run: pip install -r services/api/requirements-dev.txt
      - name: Lint with ruff
        run: ruff check services/api/
      - name: Run tests
        working-directory: services/api
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t eduai-api:ci services/api/
