name: "CI — EduAI API"

# Trigger: her push (tüm branch'lar) + her PR açılış/güncellemesi.
on: [push, pull_request]

jobs:
  # ----------------------------------------------------------------------------
  # Job 1 — Code Quality: ruff lint + format kontrolü
  # ----------------------------------------------------------------------------
  lint:
    name: "Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # pip wheel cache — ikinci run'dan itibaren install süresi saniyelere düşer
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        # --output-format=github → hataları PR'da inline annotation olarak gösterir
        run: ruff check services/api/ --output-format=github

      - name: Ruff format check
        # --check exit code ile fail eder; diff değişikliği isteyen yer varsa build kırmızı
        run: ruff format services/api/ --check

  # ----------------------------------------------------------------------------
  # Job 2 — Tests: pytest
  # needs: lint → lint geçmezse testler hiç koşmaz (fail-fast + CI dakikası tasarrufu)
  # ----------------------------------------------------------------------------
  test:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        # P1 dev deps + P3 agents/ deps (Sapma 27 — services/api artık agents/'a bağımlı:
        # routers/documents.py top-level `from agents.rag.indexer import DocumentIndexer`).
        # Conftest dependency_override mock kullansa da Python import zinciri agents/'ın
        # importable olmasını gerektirir → CI runner'a agents/requirements.txt da yüklenir.
        # bitsandbytes Linux'ta CPU build install eder; test'lerde import edilmediği için
        # runtime sorunsuz. Pip cache (setup-python `cache: pip`) ikinci run'dan saniyelere düşer.
        run: |
          pip install -r services/api/requirements-dev.txt
          pip install -r agents/requirements.txt

      - name: Run tests
        working-directory: services/api
        # PYTHONPATH cascade (Sapma 26): cwd services/api → P1 `app.X` import.
        # GITHUB_WORKSPACE → repo root → `agents.X` import. İki yol birden gerekli.
        env:
          PYTHONPATH: ${{ github.workspace }}
        # --tb=short: traceback'i kısalt (CI log'larında gürültü az)
        run: pytest tests/ -v --tb=short

  # ----------------------------------------------------------------------------
  # Job 3 — Docker Build: production image'ı CI'da build et
  # needs: test → test geçmeden image build edilmez.
  # Push yok — sadece build başarılı mı kontrol. Registry push P4'te eklenecek.
  # ----------------------------------------------------------------------------
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t eduai-api:ci services/api/

      - name: Image size check
        # Informational — fail eşiği yok. Size P1'de <200MB hedefine ulaşamadı
        # (~284MB, bilinçli kabul edildi; bkz. IMPLEMENTATION_NOTES.md Task 5).
        # NOT: SPEC `--format 'Size: {{.Size}}'` önerdi ama GitHub Actions
        # workflow parser `{{ }}` template syntax'ını expression olarak değerlendirir
        # → YAML parse error. Plain `docker images` zaten SIZE sütununu içerir.
        run: docker images eduai-api:ci

  # ----------------------------------------------------------------------------
  # Job 4 — ML Quality: ml/ kod kalitesi + JSONL schema testleri (P2)
  #
  # Dependency graph: top-level (needs: yok) → `lint` ile paralel çalışır.
  # P1 (services/api) ve P2 (ml/) bağımsız kod alanları olduğundan birinin
  # kırmızı olması diğerini bloke etmemeli; ml-quality fail olsa bile
  # API docker build hâlâ üretilir.
  #
  # Kapsam: ruff lint + format check + pytest schema testleri.
  # Training/eval (torch, transformers, peft) kurulumu CI'da YAPILMAZ —
  # GPU yok, paketler büyük (~5GB), CI dakikası verimsizliği.
  # Schema test'i dataset dosyaları yoksa pytest.skip ile geçer (CI'da
  # data/processed/*.jsonl yok; sadece varsa validation yapar).
  # ----------------------------------------------------------------------------
  ml-quality:
    name: "ML Code Quality & Schema"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install light deps
        # Sadece ruff + pytest — schema test'i json/pathlib stdlib kullanıyor.
        # SPEC'te `pyyaml jsonschema` da öneriliyordu ama mevcut test'ler
        # kullanmıyor; YAGNI ile minimal kurulum (Sapma 29).
        run: pip install ruff pytest

      - name: Ruff lint
        # --output-format=github → PR'da inline annotation
        run: ruff check ml/ --output-format=github

      - name: Ruff format check
        # Format diff'i varsa fail; pre-commit hook'u atlanmış değişiklikleri yakalar
        run: ruff format ml/ --check

      - name: Data schema tests
        # `cd ml` → ML_ROOT relative path'leri test_data_schema.py'de doğru çalışır
        working-directory: ml
        run: pytest tests/ -v --tb=short

